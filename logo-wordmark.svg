<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <defs>
    <g id="wm-paddle-back">
      <rect x="-16" y="-46" width="32" height="46" rx="13" ry="13" fill="#1E6EA6"/>
      <rect x="-6" y="0" width="12" height="38" rx="4" ry="4" fill="#1E6EA6"/>
      <line x1="-5" y1="24" x2="5" y2="24" stroke="#0B1F4A" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="30" x2="5" y2="30" stroke="#0B1F4A" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="36" x2="5" y2="36" stroke="#0B1F4A" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g id="wm-paddle-front">
      <rect x="-16" y="-46" width="32" height="46" rx="13" ry="13" fill="#C8F135"/>
      <rect x="-6" y="0" width="12" height="38" rx="4" ry="4" fill="#C8F135"/>
      <line x1="-5" y1="24" x2="5" y2="24" stroke="#acd120" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="30" x2="5" y2="30" stroke="#acd120" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="36" x2="5" y2="36" stroke="#acd120" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Icon -->
  <g transform="translate(60,60) scale(0.4)">
    <circle cx="0" cy="0" r="96" fill="#0B1F4A"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#1E6EA6" stroke-width="1.5"/>
    <use href="#wm-paddle-back" transform="rotate(38)"/>
    <use href="#wm-paddle-front" transform="rotate(-38)"/>
    <circle cx="0" cy="0" r="7" fill="#0B1F4A" stroke="#C8F135" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <text
    x="118"
    y="68"
    font-family="'Inter', system-ui, sans-serif"
    font-weight="800"
    font-size="46"
    dominant-baseline="middle"
    text-anchor="start"
  >
    <tspan fill="#C8F135">Court</tspan><tspan fill="#0B1F4A">Collab</tspan>
  </text>
</svg>
