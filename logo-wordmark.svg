<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <defs>
    <g id="wm-paddle-back">
      <rect x="-16" y="-46" width="32" height="46" rx="13" ry="13" fill="#4f8a4f"/>
      <rect x="-6" y="0" width="12" height="38" rx="4" ry="4" fill="#4f8a4f"/>
      <line x1="-5" y1="24" x2="5" y2="24" stroke="#3a6b3a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="30" x2="5" y2="30" stroke="#3a6b3a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="36" x2="5" y2="36" stroke="#3a6b3a" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g id="wm-paddle-front">
      <rect x="-16" y="-46" width="32" height="46" rx="13" ry="13" fill="#ffffff"/>
      <rect x="-6" y="0" width="12" height="38" rx="4" ry="4" fill="#ffffff"/>
      <line x1="-5" y1="24" x2="5" y2="24" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="30" x2="5" y2="30" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="36" x2="5" y2="36" stroke="#d0d0d0" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Icon: scaled to ~80px diameter, vertically centered -->
  <g transform="translate(60,60) scale(0.4)">
    <circle cx="0" cy="0" r="96" fill="#2F4F2F"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#3d6b3d" stroke-width="1.5"/>
    <use href="#wm-paddle-back" transform="rotate(38)"/>
    <use href="#wm-paddle-front" transform="rotate(-38)"/>
    <circle cx="0" cy="0" r="7" fill="#2F4F2F" stroke="#7db07d" stroke-width="2"/>
  </g>

  <!-- Wordmark: single text element with two tspans, no gap -->
  <text
    x="118"
    y="68"
    font-family="'Inter', system-ui, sans-serif"
    font-weight="800"
    font-size="46"
    dominant-baseline="middle"
    text-anchor="start"
  >
    <tspan fill="#1e351e">Court</tspan><tspan fill="#2F4F2F">Collab</tspan>
  </text>
</svg>
