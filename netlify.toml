[build]
  command = ""
  publish = "."

[functions]
  directory = "netlify/functions"

# HTML — always revalidate so users get fresh deploys immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Access-Control-Allow-Origin = "*"

# Admin page — never cache (auth-gated, data changes frequently)
[[headers]]
  for = "/admin/payments/index.html"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag  = "noindex, nofollow"

# Versioned static assets (JS, CSS, images with ?v= param) — cache 1 year, immutable
# The ?v=N query string in the HTML is the cache-buster when files change
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/ping"
  to = "https://courtcollab-production.up.railway.app/ping"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://courtcollab-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
