<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Back paddle (court blue) -->
    <g id="paddle-back">
      <rect x="-16" y="-46" width="32" height="46" rx="13" ry="13" fill="#1E6EA6"/>
      <rect x="-6" y="0" width="12" height="38" rx="4" ry="4" fill="#1E6EA6"/>
      <line x1="-6" y1="26" x2="6" y2="26" stroke="#0B1F4A" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-6" y1="31" x2="6" y2="31" stroke="#0B1F4A" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-6" y1="36" x2="6" y2="36" stroke="#0B1F4A" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Front paddle (lime) -->
    <g id="paddle-front">
      <rect x="-16" y="-46" width="32" height="46" rx="13" ry="13" fill="#C8F135"/>
      <rect x="-6" y="0" width="12" height="38" rx="4" ry="4" fill="#C8F135"/>
      <line x1="-6" y1="26" x2="6" y2="26" stroke="#acd120" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-6" y1="31" x2="6" y2="31" stroke="#acd120" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-6" y1="36" x2="6" y2="36" stroke="#acd120" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Circular badge background -->
  <circle cx="100" cy="100" r="96" fill="#0B1F4A"/>

  <!-- Thin inner ring for depth -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#1E6EA6" stroke-width="1.5"/>

  <!-- BACK paddle -->
  <use href="#paddle-back" transform="translate(100,100) rotate(38)"/>

  <!-- FRONT paddle -->
  <use href="#paddle-front" transform="translate(100,100) rotate(-38)"/>

  <!-- Accent circle at center -->
  <circle cx="100" cy="100" r="7" fill="#0B1F4A" stroke="#C8F135" stroke-width="2"/>
</svg>
